<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4AF37"/>
      <stop offset="50%" style="stop-color:#F4E4BA"/>
      <stop offset="100%" style="stop-color:#D4AF37"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#0A0A0F" stroke="url(#goldGradient)" stroke-width="2"/>

  <!-- Target Circles -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.5"/>
  <circle cx="50" cy="50" r="25" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.7"/>
  <circle cx="50" cy="50" r="15" fill="none" stroke="#D4AF37" stroke-width="1.5" opacity="0.9"/>
  <circle cx="50" cy="50" r="5" fill="url(#goldGradient)"/>

  <!-- Arrow -->
  <g filter="url(#glow)">
    <path d="M70 30 L50 50 L55 55 L75 35 Z" fill="url(#goldGradient)"/>
    <path d="M50 50 L30 70 L25 65 L45 45 Z" fill="url(#goldGradient)"/>
    <path d="M30 70 L25 80 L35 78 L38 68 Z" fill="#AA8C2C"/>
  </g>
</svg>
